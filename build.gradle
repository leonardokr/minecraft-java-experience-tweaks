plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.38'
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')
    exclude("**/*.bbmodel")
    exclude("src/generated/**/.cache")
}

// -------------------------------------------------------------------------
// Isolated sourceset for plain JUnit 5 unit tests.
// NeoForge Gradle intercepts the standard 'test' sourceset, so we use a
// dedicated 'unitTest' sourceset that NeoForge does not touch.
// -------------------------------------------------------------------------
sourceSets {
    unitTest {
        java.srcDirs = ['src/unitTest/java']
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}

repositories {
}

base {
    archivesName = mod_id
}

// Mojang ships Java 25 to end users in 26.1.2, so mods should target Java 25.
java.toolchain.languageVersion = JavaLanguageVersion.of(25)

runs {
    configureEach {
        systemProperty 'forge.logging.markers', 'REGISTRIES'
        systemProperty 'forge.logging.console.level', 'debug'
        workingDirectory project.layout.projectDirectory.dir('run').dir(name)
        modSource project.sourceSets.main
    }

    client {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        argument '--nogui'
    }

    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    clientData {
        arguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

configurations {
    runtimeClasspath.extendsFrom localRuntime

    // Wire up the unitTest sourceset configurations
    unitTestImplementation.extendsFrom implementation
    unitTestRuntimeOnly.extendsFrom runtimeOnly
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"

    // JUnit 5 for pure unit tests — scoped to the unitTest sourceset only
    unitTestImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    unitTestImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.2'
    unitTestRuntimeOnly   'org.junit.jupiter:junit-jupiter-engine:5.10.2'
    unitTestRuntimeOnly   'org.junit.platform:junit-platform-launcher:1.10.2'
}

// Task to run the plain JUnit 5 unit tests
tasks.register('unitTest', Test) {
    description = 'Runs plain JUnit 5 unit tests (no Minecraft context).'
    group = 'verification'
    useJUnitPlatform()
    testClassesDirs = sourceSets.unitTest.output.classesDirs
    classpath = sourceSets.unitTest.runtimeClasspath

    // Print each test result directly in the console
    testLogging {
        events 'passed', 'failed', 'skipped'
        showExceptions true
        showCauses true
        showStackTraces true
        exceptionFormat 'full'
        afterSuite { desc, result ->
            if (!desc.parent) {
                def status = result.failedTestCount == 0 ? 'OK' : 'FAILED'
                println "\n─────────────────────────────────────────"
                println " Results: ${status}"
                println " ${result.testCount} tests | ${result.successfulTestCount} passed | ${result.failedTestCount} failed | ${result.skippedTestCount} skipped"
                println "─────────────────────────────────────────"
            }
        }
    }
}

tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
